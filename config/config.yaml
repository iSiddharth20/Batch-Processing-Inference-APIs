env: "dev"
db_path: "storage/storage.db"

http_server:
  address: "0.0.0.0:8080"

batch_limits:
  max_prompts_per_batch: 1000
  max_prompt_characters: 1000
  max_response_characters: 1000

concurrency:
  worker_pool_size: 4
  max_concurrent_inference_calls: 4

retry:
  max_prompt_retries: 3
  max_batch_retries: 2

backoff:
  base_delay: "200ms"
  max_delay: "5s"

timeouts:
  inference_call_timeout: "10s"
  completed_job_ttl: "5m"
